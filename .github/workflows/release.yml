name: Release to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.0.0)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  LibTargetFrameworks: net8.0;net9.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Pin .NET 9 SDK
        run: echo '{"sdk":{"version":"9.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test (unit)
        run: dotnet test src/CachedQueries.Tests/CachedQueries.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack CachedQueries
        run: |
          dotnet pack src/CachedQueries/CachedQueries.csproj \
            -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            -o ./artifacts

      - name: Pack CachedQueries.Redis
        run: |
          dotnet pack src/CachedQueries.Redis/CachedQueries.Redis.csproj \
            -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            -o ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols to NuGet
        run: |
          dotnet nuget push ./artifacts/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/*
          retention-days: 30
