name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  LibTargetFrameworks: net8.0;net9.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Pin .NET 9 SDK
        run: echo '{"sdk":{"version":"9.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (unit)
        run: dotnet test src/CachedQueries.Tests/CachedQueries.Tests.csproj -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Publish coverage report
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage/**/coverage.cobertura.xml
          format: cobertura
          fail-on-error: false

  pack:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Pin .NET 9 SDK
        run: echo '{"sdk":{"version":"9.0.100","rollForward":"latestFeature"}}' > global.json

      - name: Build
        run: dotnet build -c Release

      - name: Pack
        run: |
          dotnet pack src/CachedQueries/CachedQueries.csproj -c Release -o ./artifacts --no-build
          dotnet pack src/CachedQueries.Redis/CachedQueries.Redis.csproj -c Release -o ./artifacts --no-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          retention-days: 7
