services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: cachedqueries_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d cachedqueries_demo"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: examples/Demo.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=cachedqueries_demo;Username=demo;Password=demo123"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
